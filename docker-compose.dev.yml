services:
  control-plane:
    image: ${WINDFORCE_LITE_DEV_IMAGE:-imprun/windforce-lite-dev:local}
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /src
    command:
      - air
      - -c
      - .air.control-plane.toml
    environment:
      GOCACHE: /home/windforce/.cache/go-build
      GOMODCACHE: /go/pkg/mod
      WINDFORCE_LITE_DATABASE_URL: ${WINDFORCE_LITE_DATABASE_URL:-postgres://postgres@postgres:5432/windforce_lite?sslmode=disable}
    volumes:
      - .:/src
      - windforce-data:/data
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/home/windforce/.cache/go-build

  execution-api:
    image: ${WINDFORCE_LITE_DEV_IMAGE:-imprun/windforce-lite-dev:local}
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /src
    command:
      - air
      - -c
      - .air.execution-api.toml
    environment:
      GOCACHE: /home/windforce/.cache/go-build
      GOMODCACHE: /go/pkg/mod
      WINDFORCE_LITE_DATABASE_URL: ${WINDFORCE_LITE_DATABASE_URL:-postgres://postgres@postgres:5432/windforce_lite?sslmode=disable}
    volumes:
      - .:/src
      - windforce-data:/data
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/home/windforce/.cache/go-build

  worker:
    image: ${WINDFORCE_LITE_DEV_IMAGE:-imprun/windforce-lite-dev:local}
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /src
    command:
      - air
      - -c
      - .air.worker.toml
    environment:
      GOCACHE: /home/windforce/.cache/go-build
      GOMODCACHE: /go/pkg/mod
      WINDFORCE_LITE_DATABASE_URL: ${WINDFORCE_LITE_DATABASE_URL:-postgres://postgres@postgres:5432/windforce_lite?sslmode=disable}
    volumes:
      - .:/src
      - windforce-data:/data
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/home/windforce/.cache/go-build

  webhook-dispatcher:
    image: ${WINDFORCE_LITE_DEV_IMAGE:-imprun/windforce-lite-dev:local}
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /src
    command:
      - air
      - -c
      - .air.webhook-dispatcher.toml
    environment:
      GOCACHE: /home/windforce/.cache/go-build
      GOMODCACHE: /go/pkg/mod
      WINDFORCE_LITE_DATABASE_URL: ${WINDFORCE_LITE_DATABASE_URL:-postgres://postgres@postgres:5432/windforce_lite?sslmode=disable}
    volumes:
      - .:/src
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/home/windforce/.cache/go-build

volumes:
  go-mod-cache:
  go-build-cache:
